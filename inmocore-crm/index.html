<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InmoCore | Desarrollos Inmobiliarios</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .hero-bg { background-image: linear-gradient(rgba(15, 23, 42, 0.75), rgba(15, 23, 42, 0.85)), url('img10.jpg'); background-size: cover; background-position: center; background-attachment: fixed; }
        .input-premium:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 1px #3b82f6; }
        .fade-in { animation: fadeIn 0.8s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">

    <nav class="fixed w-full z-50 bg-white/90 backdrop-blur-md border-b border-slate-200 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-20">
                <div class="flex-shrink-0 flex items-center cursor-pointer"><h1 class="text-2xl font-black tracking-tight text-slate-900">Inmo<span class="text-blue-600 font-light">Core</span></h1></div>
                <div class="hidden md:flex space-x-8 items-center">
                    <a href="#contacto" class="bg-blue-600 text-white px-6 py-2.5 rounded-lg font-bold hover:bg-blue-700 shadow-md transition">Asesoría Virtual</a>
                </div>
            </div>
        </div>
    </nav>

    <section id="inicio" class="hero-bg min-h-screen flex items-center pt-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                <div class="text-left fade-in">
                    <span class="text-blue-400 font-bold tracking-wider uppercase text-sm mb-4 block">Inversión Segura</span>
                    <h2 class="text-5xl lg:text-6xl font-black text-white leading-tight mb-6">Descubre el lugar <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400">donde tu futuro</span> comienza.</h2>
                </div>

                <div id="contacto" class="relative">
                    <div class="w-full bg-slate-900/50 backdrop-blur-xl border border-slate-700/50 p-8 rounded-2xl shadow-2xl overflow-hidden" id="main-container">
                        <div id="form-state" class="transition-all duration-500">
                            <h3 class="text-2xl font-bold text-white mb-6">Solicitar Información</h3>
                            <form id="leadForm" class="space-y-4">
                                <div><input type="text" id="nombre" name="nombre" required class="input-premium w-full bg-slate-800/60 border border-slate-600 text-white rounded-lg px-4 py-3" placeholder="Nombre Completo"></div>
                                <div><input type="email" id="email" name="email" required class="input-premium w-full bg-slate-800/60 border border-slate-600 text-white rounded-lg px-4 py-3" placeholder="Correo Electrónico"></div>
                                <div><input type="tel" id="telefono" name="telefono" required class="input-premium w-full bg-slate-800/60 border border-slate-600 text-white rounded-lg px-4 py-3" placeholder="Teléfono"></div>
                                <div class="pt-2">
                                    <label for="emprendimiento" class="block text-xs font-bold text-slate-300 mb-2 uppercase">Interés Principal</label>
                                    <select id="emprendimiento" name="emprendimiento" required class="input-premium w-full bg-slate-800/60 border border-slate-600 text-white rounded-lg px-4 py-3"><option value="" disabled selected>Sincronizando catálogo...</option></select>
                                </div>
                                <div class="pt-4"><button type="submit" id="submitBtn" class="w-full bg-blue-600 text-white font-bold rounded-lg px-4 py-3.5 hover:bg-blue-700"><i class="fas fa-paper-plane"></i> Enviar mis datos</button></div>
                            </form>
                        </div>
                        <div id="success-state" class="hidden flex flex-col items-center justify-center py-10 text-center">
                            <div class="w-20 h-20 bg-green-500/20 rounded-full flex items-center justify-center mb-6"><i class="fas fa-check text-4xl text-green-400"></i></div>
                            <h2 class="text-3xl font-black text-white mb-4">¡Datos Recibidos!</h2>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="proyectos" class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center mb-16">
                <h2 class="text-3xl md:text-4xl font-black text-slate-900 mb-4">Proyectos Destacados</h2>
                <p class="text-slate-500 max-w-2xl mx-auto">Selección exclusiva de nuestras mejores oportunidades de inversión vigentes.</p>
            </div>
            <div id="contenedor-proyectos" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-10"></div>
        </div>
    </section>

    <script>
        const CONFIG = { localStorageKey: "crm_saas_inbox_v1" };

        async function cargarDatosDinamicos() {
            const selectElement = document.getElementById('emprendimiento');
            const contenedorProyectos = document.getElementById('contenedor-proyectos');
            
            try {
                const response = await fetch('/api/propiedades');
                const propiedades = await response.json();
                
                // 1. FILTRAR SOLO LAS ACTIVAS PARA EL FORMULARIO
                const propiedadesActivas = propiedades.filter(p => p.activo !== 0);

                if (propiedadesActivas.length === 0) {
                    selectElement.innerHTML = '<option value="" disabled selected>Catálogo en mantenimiento</option>';
                    contenedorProyectos.innerHTML = '<p class="col-span-full text-center text-slate-500">No hay proyectos publicados actualmente.</p>';
                    return;
                }

                selectElement.innerHTML = '<option value="" disabled selected>-- Elige un Proyecto --</option>';
                propiedadesActivas.forEach(prop => { selectElement.innerHTML += `<option value="${prop.nombre}">${prop.nombre}</option>`; });

                // 2. FILTRAR ACTIVAS Y DESTACADAS PARA LAS TARJETAS (Max 6)
                const destacadas = propiedadesActivas.filter(p => p.destacado === 1).slice(0, 6);
                contenedorProyectos.innerHTML = '';

                if (destacadas.length === 0) {
                    contenedorProyectos.innerHTML = '<p class="col-span-full text-center text-slate-400">Pronto publicaremos nuevas oportunidades destacadas.</p>';
                } else {
                    destacadas.forEach(prop => {
                        const imgUrl = (prop.fotos && prop.fotos.trim() !== '') ? prop.fotos : 'img11.jpg';
                        contenedorProyectos.innerHTML += `
                            <div class="bg-slate-50 rounded-2xl overflow-hidden shadow-sm border border-slate-100 hover:shadow-xl transition-shadow duration-300 flex flex-col">
                                <div class="h-56 overflow-hidden relative shrink-0">
                                    <img src="${imgUrl}" alt="${prop.nombre}" class="w-full h-full object-cover">
                                    <div class="absolute top-4 left-4 bg-yellow-500 text-white text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-wide shadow-md"><i class="fas fa-star mr-1"></i>Destacado</div>
                                </div>
                                <div class="p-6 flex flex-col flex-1">
                                    <h3 class="text-xl font-bold text-slate-900 mb-1">${prop.nombre}</h3>
                                    <p class="text-slate-500 mb-4 text-xs font-medium"><i class="fas fa-map-marker-alt text-blue-500 mr-1.5"></i>${prop.ubicacion || 'Ubicación a confirmar'}</p>
                                    <p class="text-slate-600 mb-6 text-sm line-clamp-3 flex-1">${prop.descripcion || ''}</p>
                                    <div class="flex justify-between items-end border-t border-slate-100 pt-4 mt-auto">
                                        <div><p class="text-[10px] text-slate-400 uppercase font-bold">Valor Referencia</p><span class="text-lg font-black text-emerald-600">${prop.precio || 'Consultar'}</span></div>
                                        <button onclick="seleccionarInteresYScroll('${prop.nombre}')" class="text-blue-600 font-bold text-sm bg-blue-50 px-3 py-1.5 rounded-lg">Consultar</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                }
            } catch (error) { selectElement.innerHTML = '<option value="Consulta">Consulta General</option>'; }
        }

        window.seleccionarInteresYScroll = function(nombre) {
            document.getElementById('emprendimiento').value = nombre;
            document.getElementById('contacto').scrollIntoView({ behavior: 'smooth' });
        };
        window.addEventListener('DOMContentLoaded', cargarDatosDinamicos);

        // Envío de Formulario
        document.getElementById('leadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const nuevoLead = {
                id: 'web_' + Date.now(), 
                nombre: document.getElementById('nombre').value, email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value, emprendimiento: document.getElementById('emprendimiento').value,
                fecha: new Date().toLocaleString()
            };
            let leadsInbox = JSON.parse(localStorage.getItem(CONFIG.localStorageKey)) || [];
            leadsInbox.push(nuevoLead); localStorage.setItem(CONFIG.localStorageKey, JSON.stringify(leadsInbox));
            window.dispatchEvent(new Event('storage'));
            document.getElementById('form-state').classList.add('hidden');
            document.getElementById('success-state').classList.remove('hidden');
        });
    </script>
</body>
</html>
